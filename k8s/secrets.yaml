# Secret template - DO NOT commit with real values!
# Copy this file to secrets.local.yaml and fill in the values
# Apply with: kubectl apply -f secrets.local.yaml
apiVersion: v1
kind: Secret
metadata:
  name: quorvex-secrets
  namespace: quorvex
  labels:
    app.kubernetes.io/name: quorvex-secrets
type: Opaque
stringData:
  # Database credentials
  postgres-user: "playwright"
  postgres-password: "CHANGE_ME"
  database-url: "postgresql://playwright:CHANGE_ME@postgres:5432/playwright_agent"

  # API Keys
  anthropic-token: "CHANGE_ME"
  openai-api-key: "CHANGE_ME"

  # JWT Secret (generate with: openssl rand -hex 32)
  jwt-secret: "CHANGE_ME"

  # MinIO Credentials
  minio-root-user: "minioadmin"
  minio-root-password: "CHANGE_ME"

  # Initial Admin User
  initial-admin-email: "admin@example.com"
  initial-admin-password: "CHANGE_ME"

  # Security Tools
  zap-api-key: "CHANGE_ME"
