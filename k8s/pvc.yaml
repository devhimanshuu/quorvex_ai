# Persistent Volume Claims for shared storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: quorvex
  labels:
    app.kubernetes.io/name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Change to your storage class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runs-pvc
  namespace: quorvex
  labels:
    app.kubernetes.io/name: runs-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
