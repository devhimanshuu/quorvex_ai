apiVersion: v1
kind: ConfigMap
metadata:
  name: scripts-configmap
  namespace: quorvex
  labels:
    app.kubernetes.io/name: scripts-configmap
data:
  backup.sh: |
    #!/bin/bash
    #
    # PostgreSQL Backup Script for Quorvex AI
    #
    # Usage:
    #   ./scripts/backup.sh                    # Daily backup with rotation
    #   ./scripts/backup.sh --manual           # Manual backup (no rotation)
    #   ./scripts/backup.sh --restore <file>   # Restore from backup
    #
    # Configuration via environment variables:
    #   POSTGRES_USER     - Database user (default: playwright)
    #   POSTGRES_PASSWORD - Database password (required)
    #   POSTGRES_DB       - Database name (default: playwright_agent)
    #   POSTGRES_HOST     - Database host (default: localhost)
    #   POSTGRES_PORT     - Database port (default: 5432)
    #   BACKUP_DIR        - Backup directory (default: /backups)
    #   BACKUP_RETENTION  - Days to keep backups (default: 30)
    #


    set -euo pipefail

    # Install dependencies if missing (running as root)
    if [ "$(id -u)" = "0" ] && ! command -v pg_dump &> /dev/null; then
        echo "Installing postgresql-client..."
        apt-get update -qq && apt-get install -y -qq postgresql-client curl gnupg lsb-release > /dev/null 2>&1 || true
    fi

    # Install dependencies if missing (running as root)
    if [ "$(id -u)" = "0" ] && ! command -v pg_dump &> /dev/null; then
        echo "Installing postgresql-client..."
        apt-get update -qq && apt-get install -y -qq postgresql-client curl gnupg lsb-release > /dev/null 2>&1 || true
    fi

    # Configuration with defaults
    POSTGRES_USER="${POSTGRES_USER:-playwright}"
    POSTGRES_DB="${POSTGRES_DB:-playwright_agent}"
    POSTGRES_HOST="${POSTGRES_HOST:-localhost}"
    POSTGRES_PORT="${POSTGRES_PORT:-5432}"
    BACKUP_DIR="${BACKUP_DIR:-/backups}"
    BACKUP_RETENTION="${BACKUP_RETENTION:-30}"

    # Ensure password is set
    if [ -z "${POSTGRES_PASSWORD:-}" ]; then
        echo "ERROR: POSTGRES_PASSWORD environment variable is required"
        exit 1
    fi

    # Export password for pg_dump/pg_restore
    export PGPASSWORD="$POSTGRES_PASSWORD"

    # Timestamp for backup filename
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_FILE="${BACKUP_DIR}/backup_${TIMESTAMP}.sql.gz"

    # Create backup directory if it doesn't exist
    mkdir -p "$BACKUP_DIR"

    # Function to perform backup
    perform_backup() {
        local backup_type="$1"

        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Starting $backup_type backup..."

        # Perform backup with custom format (supports parallel restore)
        pg_dump \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            --verbose \
            --no-owner \
            --no-privileges \
            2>&1 | gzip > "$BACKUP_FILE"

        # Check if backup was successful
        if [ -f "$BACKUP_FILE" ] && [ -s "$BACKUP_FILE" ]; then
            BACKUP_SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Backup completed: $BACKUP_FILE ($BACKUP_SIZE)"

            # Create latest symlink
            ln -sf "$BACKUP_FILE" "${BACKUP_DIR}/latest.sql.gz"

            return 0
        else
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] ERROR: Backup failed or file is empty"
            rm -f "$BACKUP_FILE"
            return 1
        fi
    }

    # Function to rotate old backups
    rotate_backups() {
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Rotating backups older than $BACKUP_RETENTION days..."

        # Find and delete old backups
        local deleted_count=0
        while IFS= read -r -d '' file; do
            rm -f "$file"
            deleted_count=$((deleted_count + 1))
            echo "  Deleted: $(basename "$file")"
        done < <(find "$BACKUP_DIR" -name "backup_*.sql.gz" -type f -mtime +$BACKUP_RETENTION -print0 2>/dev/null || true)

        if [ $deleted_count -eq 0 ]; then
            echo "  No old backups to delete"
        else
            echo "  Deleted $deleted_count old backup(s)"
        fi

        # List remaining backups
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Current backups:"
        ls -lh "${BACKUP_DIR}"/backup_*.sql.gz 2>/dev/null | tail -10 || echo "  No backups found"
    }

    # Function to restore from backup
    restore_backup() {
        local restore_file="$1"

        if [ ! -f "$restore_file" ]; then
            echo "ERROR: Backup file not found: $restore_file"
            exit 1
        fi

        echo "[$(date '+%Y-%m-%d %H:%M:%S')] WARNING: This will overwrite the current database!"
        echo "Restoring from: $restore_file"
        read -p "Are you sure? (type 'yes' to confirm): " confirm

        if [ "$confirm" != "yes" ]; then
            echo "Restore cancelled"
            exit 0
        fi

        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Starting restore..."

        # Drop and recreate database
        psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -c "DROP DATABASE IF EXISTS ${POSTGRES_DB};"
        psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -c "CREATE DATABASE ${POSTGRES_DB};"

        # Restore from backup
        gunzip -c "$restore_file" | psql \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            --quiet

        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Restore completed successfully"
    }

    # Function to show backup status
    show_status() {
        echo "=== Backup Status ==="
        echo "Backup directory: $BACKUP_DIR"
        echo "Retention period: $BACKUP_RETENTION days"
        echo ""
        echo "Recent backups:"
        ls -lht "${BACKUP_DIR}"/backup_*.sql.gz 2>/dev/null | head -10 || echo "  No backups found"
        echo ""
        echo "Total backup size:"
        du -sh "$BACKUP_DIR" 2>/dev/null || echo "  N/A"
    }

    # Main script logic
    case "${1:-}" in
        --manual)
            perform_backup "manual"
            ;;
        --restore)
            if [ -z "${2:-}" ]; then
                echo "Usage: $0 --restore <backup_file>"
                exit 1
            fi
            restore_backup "$2"
            ;;
        --status)
            show_status
            ;;
        --rotate)
            rotate_backups
            ;;
        ""|--daily)
            perform_backup "daily"
            rotate_backups
            ;;
        --help|-h)
            echo "Usage: $0 [--manual|--daily|--restore <file>|--status|--rotate|--help]"
            echo ""
            echo "Commands:"
            echo "  (default)     Daily backup with rotation"
            echo "  --manual      Manual backup without rotation"
            echo "  --daily       Daily backup with rotation"
            echo "  --restore     Restore from backup file"
            echo "  --status      Show backup status"
            echo "  --rotate      Rotate old backups"
            echo "  --help        Show this help"
            ;;
        *)
            echo "Unknown option: $1"
            echo "Use --help for usage information"
            exit 1
            ;;
    esac

  full_backup.sh: |
    #!/bin/bash
    #
    # Full Backup Script for Quorvex AI
    #
    # Usage:
    #   ./scripts/full_backup.sh                    # Full backup with MinIO sync
    #   ./scripts/full_backup.sh --daily            # Daily backup with rotation
    #   ./scripts/full_backup.sh --manual           # Manual backup (no rotation)
    #   ./scripts/full_backup.sh --no-sync          # Backup without MinIO sync
    #   ./scripts/full_backup.sh --restore <ts>     # Restore from backup timestamp
    #   ./scripts/full_backup.sh --status           # Show backup status
    #
    # Configuration via environment variables:
    #   POSTGRES_USER       - Database user (default: playwright)
    #   POSTGRES_PASSWORD   - Database password (required)
    #   POSTGRES_DB         - Database name (default: playwright_agent)
    #   POSTGRES_HOST       - Database host (default: db)
    #   POSTGRES_PORT       - Database port (default: 5432)
    #   BACKUP_DIR          - Local backup directory (default: /backups)
    #   BACKUP_RETENTION    - Days to keep backups (default: 30)
    #   MINIO_ENDPOINT      - MinIO endpoint (default: http://minio:9000)
    #   MINIO_ROOT_USER     - MinIO access key (required for sync)
    #   MINIO_ROOT_PASSWORD - MinIO secret key (required for sync)
    #   MINIO_BUCKET        - MinIO bucket name (default: playwright-backups)
    #


    set -euo pipefail

    # Install dependencies if missing (running as root)
    if [ "$(id -u)" = "0" ] && ! command -v pg_dump &> /dev/null; then
        echo "Installing postgresql-client..."
        apt-get update -qq && apt-get install -y -qq postgresql-client curl gnupg lsb-release > /dev/null 2>&1 || true
    fi

    # =============================================================================
    # Configuration
    # =============================================================================

    # PostgreSQL configuration
    POSTGRES_USER="${POSTGRES_USER:-playwright}"
    POSTGRES_DB="${POSTGRES_DB:-playwright_agent}"
    POSTGRES_HOST="${POSTGRES_HOST:-db}"
    POSTGRES_PORT="${POSTGRES_PORT:-5432}"

    # Backup configuration
    BACKUP_DIR="${BACKUP_DIR:-/backups}"
    BACKUP_RETENTION="${BACKUP_RETENTION:-30}"
    ARCHIVE_RETENTION="${ARCHIVE_RETENTION:-90}"

    # MinIO configuration
    MINIO_ENDPOINT="${MINIO_ENDPOINT:-http://minio:9000}"
    MINIO_ROOT_USER="${MINIO_ROOT_USER:-}"
    MINIO_ROOT_PASSWORD="${MINIO_ROOT_PASSWORD:-}"
    MINIO_BUCKET="${MINIO_BUCKET:-playwright-backups}"

    # Application directories (inside container)
    APP_DIR="${APP_DIR:-/app}"
    SPECS_DIR="${APP_DIR}/specs"
    TESTS_DIR="${APP_DIR}/tests"
    PRDS_DIR="${APP_DIR}/prds"
    DATA_DIR="${APP_DIR}/data"
    RUNS_DIR="${APP_DIR}/runs"
    TEST_RESULTS_DIR="${APP_DIR}/test-results"
    SCRIPTS_DIR="${APP_DIR}/scripts"

    # Timestamp for backup filename
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_PREFIX="${BACKUP_DIR}/${TIMESTAMP}"

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # =============================================================================
    # Helper Functions
    # =============================================================================

    log_info() {
        echo -e "${GREEN}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $1"
    }

    log_warn() {
        echo -e "${YELLOW}[$(date '+%Y-%m-%d %H:%M:%S')] WARNING:${NC} $1"
    }

    log_error() {
        echo -e "${RED}[$(date '+%Y-%m-%d %H:%M:%S')] ERROR:${NC} $1" >&2
    }

    check_required_vars() {
        if [ -z "${POSTGRES_PASSWORD:-}" ]; then
            log_error "POSTGRES_PASSWORD environment variable is required"
            exit 1
        fi
    }

    check_minio_config() {
        if [ -z "${MINIO_ROOT_USER:-}" ] || [ -z "${MINIO_ROOT_PASSWORD:-}" ]; then
            log_warn "MinIO credentials not configured, skipping sync"
            return 1
        fi
        return 0
    }

    # Calculate directory size in MB
    get_dir_size() {
        local dir="$1"
        if [ -d "$dir" ]; then
            du -sm "$dir" 2>/dev/null | cut -f1
        else
            echo "0"
        fi
    }

    # =============================================================================
    # Backup Functions
    # =============================================================================

    backup_database() {
        log_info "Backing up PostgreSQL database..."

        export PGPASSWORD="$POSTGRES_PASSWORD"

        local db_backup="${BACKUP_PREFIX}_db.sql.gz"

        pg_dump \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            --no-owner \
            --no-privileges \
            2>/var/log/pg_dump.log | gzip > "$db_backup"

        if [ -f "$db_backup" ] && [ -s "$db_backup" ]; then
            local size=$(du -h "$db_backup" | cut -f1)
            log_info "Database backup completed: $db_backup ($size)"
            return 0
        else
            log_error "Database backup failed or file is empty"
            rm -f "$db_backup"
            return 1
        fi
    }

    backup_directory() {
        local src_dir="$1"
        local backup_name="$2"
        local backup_file="${BACKUP_PREFIX}_${backup_name}.tar.gz"

        if [ ! -d "$src_dir" ]; then
            log_warn "Directory not found, skipping: $src_dir"
            return 0
        fi

        local src_size=$(get_dir_size "$src_dir")
        if [ "$src_size" -eq 0 ]; then
            log_warn "Directory is empty, skipping: $src_dir"
            return 0
        fi

        log_info "Backing up $backup_name (${src_size}MB)..."

        # Create archive with relative paths
        tar -czf "$backup_file" -C "$(dirname "$src_dir")" "$(basename "$src_dir")" 2>/dev/null || {
            log_warn "Some files could not be archived from $src_dir"
        }

        if [ -f "$backup_file" ]; then
            local size=$(du -h "$backup_file" | cut -f1)
            log_info "$backup_name backup completed: $backup_file ($size)"
            return 0
        else
            log_error "Failed to create backup: $backup_file"
            return 1
        fi
    }

    backup_specs() {
        backup_directory "$SPECS_DIR" "specs"
    }

    backup_tests() {
        backup_directory "$TESTS_DIR" "tests"
    }

    backup_prds() {
        backup_directory "$PRDS_DIR" "prds"
    }

    backup_data() {
        backup_directory "$DATA_DIR" "data"
    }

    backup_runs() {
        backup_directory "$RUNS_DIR" "runs"
    }

    backup_test_results() {
        backup_directory "$TEST_RESULTS_DIR" "test-results"
    }


    backup_scripts() {
        backup_directory "$SCRIPTS_DIR" "scripts"
    }

    create_manifest() {
        log_info "Creating backup manifest..."

        local manifest_file="${BACKUP_PREFIX}_manifest.json"

        # Generate checksums for all backup files
        local checksums=()
        local files_found=0

        # Find all backup files with this timestamp
        while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
                local checksum=$(sha256sum "$file" | cut -d' ' -f1)
                local filename=$(basename "$file")
                local size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo "0")
                checksums+=("\"$filename\": {\"sha256\": \"$checksum\", \"size\": $size}")
                files_found=$((files_found + 1))
            fi
        done < <(find "$BACKUP_DIR" -maxdepth 1 -name "${TIMESTAMP}_*" -type f -print0 2>/dev/null)

        # Build JSON manifest
        local files_json=""
        if [ ${#checksums[@]} -gt 0 ]; then
            files_json=$(IFS=,; echo "${checksums[*]}")
        fi

        cat > "$manifest_file" << EOF
    {
        "timestamp": "$TIMESTAMP",
        "created_at": "$(date -Iseconds 2>/dev/null || date +%Y-%m-%dT%H:%M:%S)",
        "version": "1.0",
        "components": {
            "database": "postgresql",
            "database_name": "$POSTGRES_DB",
            "specs_dir": "$SPECS_DIR",
            "tests_dir": "$TESTS_DIR",
            "prds_dir": "$PRDS_DIR",
            "prds_dir": "$PRDS_DIR",
            "data_dir": "$DATA_DIR",
            "scripts_dir": "$SCRIPTS_DIR"
        },
        "files": {
            $files_json
        },
        "retention": {
            "hot_days": $BACKUP_RETENTION,
            "archive_days": $ARCHIVE_RETENTION
        },
        "notes": [
            "CRITICAL: .env file must be backed up separately",
            "Contains JWT_SECRET_KEY required for credential decryption"
        ]
    }
    EOF

        log_info "Manifest created: $manifest_file ($files_found files tracked)"
    }

    # =============================================================================
    # MinIO Sync Functions
    # =============================================================================

    setup_minio_client() {
        log_info "Configuring MinIO client..."

        # Check if mc is available
        if ! command -v mc &> /dev/null; then
            log_warn "MinIO client (mc) not found, attempting to download..."

            # Download mc based on architecture
            local arch=$(uname -m)
            local mc_url=""

            case "$arch" in
                x86_64)
                    mc_url="https://dl.min.io/client/mc/release/linux-amd64/mc"
                    ;;
                aarch64|arm64)
                    mc_url="https://dl.min.io/client/mc/release/linux-arm64/mc"
                    ;;
                *)
                    log_error "Unsupported architecture: $arch"
                    return 1
                    ;;
            esac

            curl -sL "$mc_url" -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc
        fi

        # Configure mc alias
        mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --api S3v4 2>/dev/null

        # Create bucket if it doesn't exist
        if ! mc ls minio/"$MINIO_BUCKET" &>/dev/null; then
            log_info "Creating MinIO bucket: $MINIO_BUCKET"
            mc mb minio/"$MINIO_BUCKET" --ignore-existing
        fi

        return 0
    }

    sync_to_minio() {
        log_info "Syncing backups to MinIO..."

        # Sync all backup files from current timestamp
        local uploaded=0
        while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
                local filename=$(basename "$file")
                log_info "Uploading: $filename"
                mc cp "$file" "minio/$MINIO_BUCKET/$filename"
                uploaded=$((uploaded + 1))
            fi
        done < <(find "$BACKUP_DIR" -maxdepth 1 -name "${TIMESTAMP}_*" -type f -print0 2>/dev/null)

        log_info "MinIO sync completed ($uploaded files uploaded)"
    }

    cleanup_minio_old() {
        log_info "Cleaning up old backups in MinIO (older than $ARCHIVE_RETENTION days)..."

        # Calculate cutoff date
        local cutoff_date=$(date -d "-${ARCHIVE_RETENTION} days" +%Y%m%d 2>/dev/null || \
                            date -v-${ARCHIVE_RETENTION}d +%Y%m%d 2>/dev/null)

        if [ -z "$cutoff_date" ]; then
            log_warn "Could not calculate cutoff date, skipping MinIO cleanup"
            return 0
        fi

        # List and remove old files
        mc ls minio/"$MINIO_BUCKET"/ --json 2>/dev/null | while read -r line; do
            local key=$(echo "$line" | jq -r '.key // empty' 2>/dev/null)
            if [ -n "$key" ]; then
                # Extract timestamp from filename (format: YYYYMMDD_HHMMSS)
                local file_date=$(echo "$key" | grep -oE '^[0-9]{8}' || echo "")
                if [ -n "$file_date" ] && [ "$file_date" -lt "$cutoff_date" ]; then
                    log_info "Removing old backup: $key"
                    mc rm "minio/$MINIO_BUCKET/$key" 2>/dev/null || true
                fi
            fi
        done
    }

    # =============================================================================
    # Rotation Functions
    # =============================================================================

    rotate_local_backups() {
        log_info "Rotating local backups older than $BACKUP_RETENTION days..."

        local deleted_count=0

        # Find and delete old backups
        while IFS= read -r -d '' file; do
            rm -f "$file"
            deleted_count=$((deleted_count + 1))
            log_info "  Deleted: $(basename "$file")"
        done < <(find "$BACKUP_DIR" -name "*_db.sql.gz" -o -name "*_*.tar.gz" -o -name "*_manifest.json" -type f -mtime +$BACKUP_RETENTION -print0 2>/dev/null || true)

        if [ $deleted_count -eq 0 ]; then
            log_info "  No old backups to delete"
        else
            log_info "  Deleted $deleted_count old file(s)"
        fi
    }

    # =============================================================================
    # Status Functions
    # =============================================================================

    show_status() {
        echo "=== Full Backup Status ==="
        echo ""
        echo "Configuration:"
        echo "  Backup directory: $BACKUP_DIR"
        echo "  Retention: $BACKUP_RETENTION days (local), $ARCHIVE_RETENTION days (MinIO)"
        echo "  MinIO endpoint: $MINIO_ENDPOINT"
        echo "  MinIO bucket: $MINIO_BUCKET"
        echo ""

        echo "Local Backups:"
        local latest=$(ls -t "${BACKUP_DIR}"/*_manifest.json 2>/dev/null | head -1)
        if [ -n "$latest" ]; then
            echo "  Latest: $(basename "$latest" | sed 's/_manifest.json//')"
            cat "$latest" | jq -r '.created_at // "unknown"' 2>/dev/null | sed 's/^/  Created: /'
        else
            echo "  No backups found"
        fi
        echo ""

        echo "Recent backups:"
        ls -lht "${BACKUP_DIR}"/*_manifest.json 2>/dev/null | head -5 || echo "  None"
        echo ""

        echo "Local backup size:"
        du -sh "$BACKUP_DIR" 2>/dev/null || echo "  N/A"
        echo ""

        # MinIO status
        if check_minio_config; then
            echo "MinIO Status:"
            if setup_minio_client 2>/dev/null; then
                mc ls minio/"$MINIO_BUCKET"/ --summarize 2>/dev/null | tail -3 || echo "  Could not connect"
            else
                echo "  MinIO client not available"
            fi
        else
            echo "MinIO: Not configured"
        fi
    }

    # =============================================================================
    # Full Backup Function
    # =============================================================================

    perform_full_backup() {
        local backup_type="${1:-full}"
        local sync_enabled="${2:-true}"

        log_info "Starting $backup_type backup..."
        echo ""

        # Create backup directory
        mkdir -p "$BACKUP_DIR"

        # Perform all backups
        local failed=0

        backup_database || failed=1
        backup_specs || true
        backup_tests || true
        backup_prds || true
        backup_data || true
        backup_runs || true
        backup_runs || true
        backup_test_results || true
        backup_scripts || true

        # Create manifest
        create_manifest

        echo ""

        # Sync to MinIO if enabled and configured
        if [ "$sync_enabled" = "true" ] && check_minio_config; then
            if setup_minio_client; then
                sync_to_minio
                cleanup_minio_old
            fi
        fi

        # Show summary
        echo ""
        log_info "=== Backup Summary ==="
        echo ""
        echo "Timestamp: $TIMESTAMP"
        echo "Location: $BACKUP_DIR"
        echo ""
        echo "Files created:"
        ls -lh "${BACKUP_PREFIX}"_* 2>/dev/null | awk '{print "  " $NF " (" $5 ")"}'
        echo ""

        if [ $failed -eq 0 ]; then
            log_info "Backup completed successfully!"
        else
            log_warn "Backup completed with warnings (some components may have failed)"
        fi

        # Create symlink to latest
        ln -sf "${BACKUP_PREFIX}_manifest.json" "${BACKUP_DIR}/latest_manifest.json"

        echo ""
        log_warn "REMINDER: Backup .env file separately - it contains JWT_SECRET_KEY!"
        log_warn "Without JWT_SECRET_KEY, encrypted credentials cannot be decrypted."

        return $failed
    }

    # =============================================================================
    # Main Script Logic
    # =============================================================================

    case "${1:-}" in
        --manual)
            check_required_vars
            perform_full_backup "manual" "true"
            ;;
        --daily)
            check_required_vars
            perform_full_backup "daily" "true"
            rotate_local_backups
            ;;
        --no-sync)
            check_required_vars
            perform_full_backup "manual" "false"
            ;;
        --status)
            show_status
            ;;
        --rotate)
            rotate_local_backups
            ;;
        --help|-h)
            echo "Usage: $0 [OPTIONS]"
            echo ""
            echo "Options:"
            echo "  (default)     Full backup with MinIO sync"
            echo "  --daily       Daily backup with rotation and MinIO sync"
            echo "  --manual      Manual backup with MinIO sync"
            echo "  --no-sync     Backup without MinIO sync"
            echo "  --status      Show backup status"
            echo "  --rotate      Rotate old local backups"
            echo "  --help        Show this help"
            echo ""
            echo "Backed up components:"
            echo "  - PostgreSQL database"
            echo "  - /app/specs (test specifications)"
            echo "  - /app/tests (generated tests)"
            echo "  - /app/prds (PRD documents)"
            echo "  - /app/data (ChromaDB vectors + graph store)"
            echo "  - /app/runs (run artifacts)"
            echo "  - /app/test-results (Playwright reports)"
            echo ""
            echo "IMPORTANT: .env file must be backed up separately!"
            echo "It contains JWT_SECRET_KEY required for credential decryption."
            ;;
        "")
            check_required_vars
            perform_full_backup "full" "true"
            ;;
        *)
            log_error "Unknown option: $1"
            echo "Use --help for usage information"
            exit 1
            ;;
    esac

  restore.sh: |
    #!/bin/bash
    #
    # Full Restore Script for Quorvex AI
    #
    # This script restores from comprehensive backups including:
    # - PostgreSQL database
    # - Specs directory (test specifications)
    # - Tests directory (generated tests)
    # - PRDs directory (PRD documents)
    # - ChromaDB data directory (vectors + graph store)
    # - Test results (Playwright reports)
    #
    # Usage:
    #   ./scripts/restore.sh <timestamp>              # Restore from specific backup
    #   ./scripts/restore.sh --latest                 # Restore from latest backup
    #   ./scripts/restore.sh --list                   # List available backups
    #   ./scripts/restore.sh --from-minio <timestamp> # Download from MinIO and restore
    #   ./scripts/restore.sh --verify <timestamp>     # Verify backup integrity
    #
    # IMPORTANT: Ensure .env file is restored separately before running this script!
    # The .env file contains JWT_SECRET_KEY required for credential decryption.
    #

    set -euo pipefail

    # Install dependencies if missing (running as root)
    if [ "$(id -u)" = "0" ] && ! command -v psql &> /dev/null; then
        echo "Installing postgresql-client..."
        apt-get update -qq && apt-get install -y -qq postgresql-client curl gnupg lsb-release > /dev/null 2>&1 || true
    fi

    # =============================================================================
    # Configuration
    # =============================================================================

    # PostgreSQL configuration
    POSTGRES_USER="${POSTGRES_USER:-playwright}"
    POSTGRES_DB="${POSTGRES_DB:-playwright_agent}"
    POSTGRES_HOST="${POSTGRES_HOST:-db}"
    POSTGRES_PORT="${POSTGRES_PORT:-5432}"

    # Backup configuration
    BACKUP_DIR="${BACKUP_DIR:-/backups}"

    # MinIO configuration
    MINIO_ENDPOINT="${MINIO_ENDPOINT:-http://minio:9000}"
    MINIO_ROOT_USER="${MINIO_ROOT_USER:-}"
    MINIO_ROOT_PASSWORD="${MINIO_ROOT_PASSWORD:-}"
    MINIO_BUCKET="${MINIO_BUCKET:-playwright-backups}"

    # Application directories (inside container)
    APP_DIR="${APP_DIR:-/app}"
    SPECS_DIR="${APP_DIR}/specs"
    TESTS_DIR="${APP_DIR}/tests"
    PRDS_DIR="${APP_DIR}/prds"
    DATA_DIR="${APP_DIR}/data"
    RUNS_DIR="${APP_DIR}/runs"
    TEST_RESULTS_DIR="${APP_DIR}/test-results"
    SCRIPTS_DIR="${APP_DIR}/scripts"

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    BLUE='\033[0;34m'
    NC='\033[0m' # No Color

    # =============================================================================
    # Helper Functions
    # =============================================================================

    log_info() {
        echo -e "${GREEN}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $1"
    }

    log_warn() {
        echo -e "${YELLOW}[$(date '+%Y-%m-%d %H:%M:%S')] WARNING:${NC} $1"
    }

    log_error() {
        echo -e "${RED}[$(date '+%Y-%m-%d %H:%M:%S')] ERROR:${NC} $1" >&2
    }

    log_step() {
        echo -e "${BLUE}[$(date '+%Y-%m-%d %H:%M:%S')] STEP:${NC} $1"
    }

    check_required_vars() {
        if [ -z "${POSTGRES_PASSWORD:-}" ]; then
            log_error "POSTGRES_PASSWORD environment variable is required"
            exit 1
        fi
    }

    check_minio_config() {
        if [ -z "${MINIO_ROOT_USER:-}" ] || [ -z "${MINIO_ROOT_PASSWORD:-}" ]; then
            log_warn "MinIO credentials not configured"
            return 1
        fi
        return 0
    }

    confirm_action() {
        local message="$1"
        echo ""
        echo -e "${YELLOW}$message${NC}"
        read -p "Type 'yes' to confirm: " confirm
        if [ "$confirm" != "yes" ]; then
            log_info "Operation cancelled"
            exit 0
        fi
    }

    # =============================================================================
    # MinIO Functions
    # =============================================================================

    setup_minio_client() {
        if ! command -v mc &> /dev/null; then
            log_warn "MinIO client (mc) not found, attempting to download..."

            local arch=$(uname -m)
            local mc_url=""

            case "$arch" in
                x86_64)
                    mc_url="https://dl.min.io/client/mc/release/linux-amd64/mc"
                    ;;
                aarch64|arm64)
                    mc_url="https://dl.min.io/client/mc/release/linux-arm64/mc"
                    ;;
                *)
                    log_error "Unsupported architecture: $arch"
                    return 1
                    ;;
            esac

            curl -sL "$mc_url" -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc
        fi

        mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --api S3v4 2>/dev/null
        return 0
    }

    download_from_minio() {
        local timestamp="$1"

        log_info "Downloading backup files from MinIO..."

        # Download all files with matching timestamp
        local files=(
            "${timestamp}_db.sql.gz"
            "${timestamp}_specs.tar.gz"
            "${timestamp}_tests.tar.gz"
            "${timestamp}_prds.tar.gz"
            "${timestamp}_data.tar.gz"
            "${timestamp}_runs.tar.gz"
            "${timestamp}_test-results.tar.gz"
            "${timestamp}_manifest.json"
        )

        mkdir -p "$BACKUP_DIR"

        for file in "${files[@]}"; do
            if mc stat "minio/$MINIO_BUCKET/$file" &>/dev/null; then
                log_info "Downloading: $file"
                mc cp "minio/$MINIO_BUCKET/$file" "$BACKUP_DIR/"
            else
                log_warn "File not found in MinIO: $file"
            fi
        done

        log_info "Download completed"
    }

    # =============================================================================
    # Verification Functions
    # =============================================================================

    verify_backup() {
        local timestamp="$1"
        local manifest="${BACKUP_DIR}/${timestamp}_manifest.json"

        log_info "Verifying backup integrity..."

        if [ ! -f "$manifest" ]; then
            log_error "Manifest not found: $manifest"
            return 1
        fi

        local failed=0

        # Parse manifest and verify checksums
        while IFS= read -r line; do
            local filename=$(echo "$line" | jq -r '.filename // empty' 2>/dev/null)
            local expected_sha=$(echo "$line" | jq -r '.sha256 // empty' 2>/dev/null)

            if [ -n "$filename" ] && [ -n "$expected_sha" ]; then
                local filepath="${BACKUP_DIR}/${filename}"
                if [ -f "$filepath" ]; then
                    local actual_sha=$(sha256sum "$filepath" | cut -d' ' -f1)
                    if [ "$actual_sha" = "$expected_sha" ]; then
                        log_info "  ✓ $filename - OK"
                    else
                        log_error "  ✗ $filename - CHECKSUM MISMATCH"
                        failed=1
                    fi
                else
                    log_warn "  - $filename - NOT FOUND"
                fi
            fi
        done < <(jq -c '.files | to_entries[] | {filename: .key, sha256: .value.sha256}' "$manifest" 2>/dev/null)

        if [ $failed -eq 0 ]; then
            log_info "Backup verification passed"
            return 0
        else
            log_error "Backup verification failed"
            return 1
        fi
    }

    # =============================================================================
    # Restore Functions
    # =============================================================================

    restore_database() {
        local timestamp="$1"
        local db_backup="${BACKUP_DIR}/${timestamp}_db.sql.gz"

        if [ ! -f "$db_backup" ]; then
            log_error "Database backup not found: $db_backup"
            return 1
        fi

        log_step "Restoring PostgreSQL database..."

        export PGPASSWORD="$POSTGRES_PASSWORD"

        # Wait for database to be ready
        log_info "Waiting for database connection..."
        local retries=30
        while [ $retries -gt 0 ]; do
            if pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" &>/dev/null; then
                break
            fi
            sleep 1
            retries=$((retries - 1))
        done

        if [ $retries -eq 0 ]; then
            log_error "Database is not ready"
            return 1
        fi

        # Drop existing database and recreate
        log_info "Dropping existing database..."
        psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -c "DROP DATABASE IF EXISTS ${POSTGRES_DB};" 2>/dev/null || true

        log_info "Creating new database..."
        psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -c "CREATE DATABASE ${POSTGRES_DB};"

        # Restore from backup
        log_info "Restoring database from backup..."
        gunzip -c "$db_backup" | psql \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            --quiet 2>/dev/null

        log_info "Database restore completed"
    }

    restore_directory() {
        local timestamp="$1"
        local backup_name="$2"
        local target_dir="$3"
        local backup_file="${BACKUP_DIR}/${timestamp}_${backup_name}.tar.gz"

        if [ ! -f "$backup_file" ]; then
            log_warn "Backup not found, skipping: $backup_file"
            return 0
        fi

        log_step "Restoring $backup_name to $target_dir..."

        # Create parent directory if needed
        mkdir -p "$(dirname "$target_dir")"

        # Backup existing directory if it exists
        if [ -d "$target_dir" ] && [ "$(ls -A "$target_dir" 2>/dev/null)" ]; then
            local backup_existing="${target_dir}.restore-backup"
            log_info "Backing up existing $target_dir to $backup_existing"
            mv "$target_dir" "$backup_existing"
        fi

        # Extract backup
        tar -xzf "$backup_file" -C "$(dirname "$target_dir")"

        log_info "$backup_name restore completed"
    }

    restore_specs() {
        local timestamp="$1"
        restore_directory "$timestamp" "specs" "$SPECS_DIR"
    }

    restore_tests() {
        local timestamp="$1"
        restore_directory "$timestamp" "tests" "$TESTS_DIR"
    }

    restore_prds() {
        local timestamp="$1"
        restore_directory "$timestamp" "prds" "$PRDS_DIR"
    }

    restore_data() {
        local timestamp="$1"
        restore_directory "$timestamp" "data" "$DATA_DIR"
    }

    restore_runs() {
        local timestamp="$1"
        restore_directory "$timestamp" "runs" "$RUNS_DIR"
    }

    restore_test_results() {
        local timestamp="$1"
        restore_directory "$timestamp" "test-results" "$TEST_RESULTS_DIR"
    }

    restore_scripts() {
        local timestamp="$1"
        restore_directory "$timestamp" "scripts" "$SCRIPTS_DIR"
    }

    # =============================================================================
    # Main Restore Function
    # =============================================================================

    perform_full_restore() {
        local timestamp="$1"
        local from_minio="${2:-false}"

        log_info "Starting full restore from backup: $timestamp"
        echo ""

        # Check for .env file warning
        echo ""
        log_warn "========================================"
        log_warn "CRITICAL: Ensure .env file is restored!"
        log_warn "========================================"
        log_warn ""
        log_warn "The .env file contains JWT_SECRET_KEY which is required"
        log_warn "to decrypt stored credentials in the database."
        log_warn ""
        log_warn "If JWT_SECRET_KEY is different from the original backup,"
        log_warn "all encrypted credentials will be UNRECOVERABLE."
        log_warn ""

        confirm_action "WARNING: This will overwrite all existing data. Continue?"

        # Download from MinIO if requested
        if [ "$from_minio" = "true" ]; then
            if ! check_minio_config; then
                log_error "MinIO credentials not configured"
                exit 1
            fi
            setup_minio_client
            download_from_minio "$timestamp"
        fi

        # Verify backup exists
        local manifest="${BACKUP_DIR}/${timestamp}_manifest.json"
        if [ ! -f "$manifest" ]; then
            log_error "Backup manifest not found: $manifest"
            log_error "Available backups:"
            list_backups
            exit 1
        fi

        # Verify backup integrity
        verify_backup "$timestamp" || {
            log_warn "Backup verification failed, some files may be missing or corrupted"
            read -p "Continue anyway? (yes/no): " continue_anyway
            if [ "$continue_anyway" != "yes" ]; then
                exit 1
            fi
        }

        echo ""

        # Perform restore in order
        restore_database "$timestamp"
        restore_specs "$timestamp"
        restore_tests "$timestamp"
        restore_prds "$timestamp"
        restore_data "$timestamp"
        restore_runs "$timestamp"
        restore_runs "$timestamp"
        restore_test_results "$timestamp"
        restore_scripts "$timestamp"

        echo ""
        log_info "=== Restore Summary ==="
        echo ""
        echo "Restored from: $timestamp"
        echo ""

        # Show manifest info
        if [ -f "$manifest" ]; then
            echo "Backup details:"
            jq -r '.created_at // "unknown"' "$manifest" | sed 's/^/  Created: /'
            jq -r '.components.database_name // "unknown"' "$manifest" | sed 's/^/  Database: /'
        fi

        echo ""
        log_info "Full restore completed!"
        echo ""

        log_warn "NEXT STEPS:"
        log_warn "1. Verify .env file has correct JWT_SECRET_KEY"
        log_warn "2. Restart the application: docker-compose restart backend frontend"
        log_warn "3. Test user login to verify JWT tokens work"
        log_warn "4. Test credential decryption (view stored credentials)"
    }

    # =============================================================================
    # List Backups Function
    # =============================================================================

    list_backups() {
        echo "=== Available Backups ==="
        echo ""

        echo "Local backups ($BACKUP_DIR):"
        if ls "${BACKUP_DIR}"/*_manifest.json &>/dev/null; then
            for manifest in "${BACKUP_DIR}"/*_manifest.json; do
                local timestamp=$(basename "$manifest" | sed 's/_manifest.json//')
                local created=$(jq -r '.created_at // "unknown"' "$manifest" 2>/dev/null)
                echo "  $timestamp (created: $created)"
            done
        else
            echo "  None found"
        fi

        echo ""

        # List MinIO backups if configured
        if check_minio_config && setup_minio_client 2>/dev/null; then
            echo "MinIO backups ($MINIO_BUCKET):"
            mc ls minio/"$MINIO_BUCKET"/ 2>/dev/null | grep "_manifest.json" | while read -r line; do
                local filename=$(echo "$line" | awk '{print $NF}')
                local timestamp=$(echo "$filename" | sed 's/_manifest.json//')
                echo "  $timestamp (in MinIO)"
            done || echo "  None found or MinIO not accessible"
        fi
    }

    # =============================================================================
    # Main Script Logic
    # =============================================================================

    case "${1:-}" in
        --list)
            list_backups
            ;;
        --latest)
            check_required_vars
            latest=$(ls -t "${BACKUP_DIR}"/*_manifest.json 2>/dev/null | head -1)
            if [ -z "$latest" ]; then
                log_error "No local backups found"
                exit 1
            fi
            timestamp=$(basename "$latest" | sed 's/_manifest.json//')
            perform_full_restore "$timestamp" "false"
            ;;
        --from-minio)
            check_required_vars
            if [ -z "${2:-}" ]; then
                log_error "Timestamp required: $0 --from-minio <timestamp>"
                exit 1
            fi
            perform_full_restore "$2" "true"
            ;;
        --verify)
            if [ -z "${2:-}" ]; then
                log_error "Timestamp required: $0 --verify <timestamp>"
                exit 1
            fi
            verify_backup "$2"
            ;;
        --help|-h)
            echo "Usage: $0 [OPTIONS] [timestamp]"
            echo ""
            echo "Options:"
            echo "  <timestamp>               Restore from specific backup timestamp"
            echo "  --latest                  Restore from latest local backup"
            echo "  --list                    List available backups"
            echo "  --from-minio <timestamp>  Download from MinIO and restore"
            echo "  --verify <timestamp>      Verify backup integrity"
            echo "  --help                    Show this help"
            echo ""
            echo "CRITICAL: Before restoring, ensure .env file is in place!"
            echo "The .env file contains JWT_SECRET_KEY required for credential decryption."
            echo ""
            echo "Example:"
            echo "  $0 20240115_143022           # Restore from specific backup"
            echo "  $0 --from-minio 20240115_143022  # Download and restore from MinIO"
            ;;
        "")
            log_error "Timestamp required. Use --list to see available backups."
            echo "Usage: $0 <timestamp> or $0 --latest"
            exit 1
            ;;
        *)
            # Assume first argument is a timestamp
            check_required_vars
            perform_full_restore "$1" "false"
            ;;
    esac
